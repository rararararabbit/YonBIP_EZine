name: Deploy YonBIP_EZine

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 123.56.7.111
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/,package.json,package-lock.json"
          target: "/var/www/YonBIP_EZine"
          overwrite: true

      - name: Install production deps and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 123.56.7.111
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /var/www/YonBIP_EZine
            npm ci --omit=dev
            NODE_ENV=production pm2 restart YonBIP_EZine --update-env || NODE_ENV=production pm2 start dist/server.cjs --name YonBIP_EZine
